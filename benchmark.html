<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Benchmark: Live Collection vs Static Array</title>
    <style>
        .test-class {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s, transform 0.5s;
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <script>
        const count = 20000;
        const container = document.getElementById('container');

        // Create elements
        const fragment = document.createDocumentFragment();
        for (let i = 0; i < count; i++) {
            const div = document.createElement('div');
            fragment.appendChild(div);
        }
        container.appendChild(fragment);

        const elementsArray = Array.from(container.children);

        // Benchmark 1: Live Collection
        const startLive = performance.now();
        for (const el of container.children) {
            el.classList.add('test-class');
        }
        const endLive = performance.now();
        const timeLive = endLive - startLive;
        console.log(`Live Collection Time: ${timeLive.toFixed(2)}ms`);

        // Reset
        for (const el of container.children) {
            el.style = '';
            el.className = '';
        }

        // Benchmark 2: Static Array (Optimized from Legacy Inline)
        const startArray = performance.now();
        elementsArray.forEach(el => {
            el.classList.add('test-class');
        });
        const endArray = performance.now();
        const timeArray = endArray - startArray;
        console.log(`Static Array Time: ${timeArray.toFixed(2)}ms`);

        // Display results
        const results = document.createElement('div');
        results.innerHTML = `
            <h2>Results (${count} elements)</h2>
            <p><strong>Baseline:</strong> Live Collection: ${timeLive.toFixed(2)}ms</p>
            <p><strong>Optimized:</strong> Static Array: ${timeArray.toFixed(2)}ms</p>
            <p>Improvement (Array vs Live): ${((timeLive - timeArray) / timeLive * 100).toFixed(2)}%</p>
            <hr>
            <p><small>Note: Legacy Inline Styles were replaced by the Static Array approach for comparison.</small></p>
        `;
        document.body.insertBefore(results, container);
    </script>
</body>
</html>
