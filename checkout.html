<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #eeeeee;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .checkout-container {
            background: #121212;
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
        }

        .order-summary {
            margin-bottom: 2rem;
        }

        .order-summary h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 0.5rem;
        }

        #order-items {
            margin-bottom: 1rem;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
        }

        .order-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 700;
            padding-top: 1rem;
            border-top: 1px solid #2a2a2a;
        }

        #back-to-shop {
            background: #3b82f6;
            color: #fff;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 48px;
        }
        .checkout-btn:hover {
            background: #059669;
        }
        .checkout-btn:active {
            transform: scale(0.95);
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        #back-to-shop:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkout-grid">
            <div class="checkout-form">
                <h2 class="section-title">Shipping & Payment</h2>
                <form id="payment-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" inputmode="text" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" inputmode="email" required>
                    </div>
                    <div class="form-group">
                        <label for="address">Shipping Address</label>
                        <input type="text" id="address" inputmode="text" required>
                    </div>
                    <div class="form-group">
                        <label for="card-element">
                          Credit or debit card
                        </label>
                        <div id="card-element">
                          <!-- A Stripe Element will be inserted here. -->
                        </div>
                        <!-- Used to display form errors. -->
                        <div id="card-errors" role="alert"></div>
                    </div>
                    <button class="checkout-btn">Submit Payment</button>
                </form>
            </div>
            <div class="order-summary">
                <h2 class="section-title">Order Summary</h2>
                <div id="summary-items">
                </div>
                <div class="summary-total">
                    <span>Total</span>
                    <span id="summary-total"></span>
                </div>
            </div>
        </div>
        <button id="back-to-shop">Back to Shop</button>
    </div>
    <script src="checkout.js"></script>
</body>
</html>
