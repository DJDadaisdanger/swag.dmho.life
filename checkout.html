<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - .studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mini.css/3.0.1/mini-default.min.css">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #0a0a0a;
        color: #eeeeee;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
      }
      .checkout-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
      }
      @media (max-width: 768px) {
        .checkout-grid {
          grid-template-columns: 1fr;
        }
      }
      .checkout-form,
      .order-summary {
        background: #121212;
        padding: 2rem;
        border-radius: 12px;
      }
      .section-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 2rem;
        letter-spacing: -0.02em;
      }
      .form-group {
        margin-bottom: 1.5rem;
      }
      .form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      .form-group input {
        width: 100%;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        color: #eeeeee;
        padding: 1rem;
        border-radius: 8px;
        font-size: 1rem;
        font-family: inherit;
        transition: border-color 0.2s;
        min-height: 48px;
      }
      form {
        background: transparent;
        padding: 0;
        border: none;
        margin: 0;
        color: #eeeeee;
      }
      .form-group input:focus {
        outline: none;
        border-color: #3b82f6;
      }
      #card-element {
        padding: 1rem;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
      }
      .checkout-btn {
        width: 100%;
        background: #10b981;
        color: #fff;
        border: none;
        padding: 1rem;
        font-size: 1.05rem;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s;
        min-height: 48px;
      }
      .checkout-btn:hover {
        background: #059669;
      }
      .checkout-btn:active {
        transform: scale(0.95);
      }
      .summary-item {
        display: flex;
        justify-content: space-between;
        margin-bottom: 1rem;
      }
      .summary-total {
        display: flex;
        justify-content: space-between;
        font-size: 1.3rem;
        font-weight: 700;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid #2a2a2a;
      }
      .back-to-shop-btn {
        display: block;
        text-align: center;
        background: #3b82f6;
        color: #fff;
        padding: 1rem;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s;
        width: 100%;
        margin-top: 1.5rem;
      }
      .back-to-shop-btn:hover {
        background: #2563eb;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="checkout-grid">
        <div class="checkout-form" style="background: #121212; padding: 2rem; border-radius: 12px; border: 1px solid #2a2a2a;">
          <h2 class="section-title">Shipping & Payment</h2>
          <form id="payment-form">
            <div class="form-group">
              <label for="name">Full Name</label>
              <input type="text" id="name" inputmode="text" required style="width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; color: #eeeeee; padding: 1rem; border-radius: 8px; font-size: 1rem; font-family: inherit; transition: border-color 0.2s; min-height: 48px;" onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='#2a2a2a'" />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" inputmode="email" required style="width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; color: #eeeeee; padding: 1rem; border-radius: 8px; font-size: 1rem; font-family: inherit; transition: border-color 0.2s; min-height: 48px;" onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='#2a2a2a'" />
            </div>
            <div class="form-group">
              <label for="address">Shipping Address</label>
              <input type="text" id="address" inputmode="text" required style="width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; color: #eeeeee; padding: 1rem; border-radius: 8px; font-size: 1rem; font-family: inherit; transition: border-color 0.2s; min-height: 48px;" onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='#2a2a2a'" />
            </div>
            <div class="form-group">
              <label for="card-element"> Credit or debit card </label>
              <div id="card-element" style="padding: 1rem; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; min-height: 48px; transition: border-color 0.2s;">
                <!-- A Stripe Element will be inserted here. -->
              </div>
              <!-- Used to display form errors. -->
              <div id="card-errors" role="alert"></div>
            </div>
            <button class="checkout-btn" style="background: #10b981; color: #fff; border: none; padding: 1rem; font-size: 1.05rem; font-weight: 600; border-radius: 8px; cursor: pointer; transition: all 0.3s; min-height: 48px; width: 100%;">Submit Payment</button>
          </form>
          <div>
            <a href="/" id="back-to-shop" class="back-to-shop-btn">Back to Shop</a>
          </div>
        </div>
        <div class="order-summary" style="background: #121212; padding: 2rem; border-radius: 12px; border: 1px solid #2a2a2a;">
          <h2 class="section-title">Order Summary</h2>
          <div id="summary-items"></div>
          <div class="summary-total">
            <span>Total</span>
            <span id="summary-total"></span>
          </div>
        </div>
      </div>
    </div>
    <script src="js/products.js"></script>
    <script src="js/checkout.js" defer></script>
  </body>
</html>
